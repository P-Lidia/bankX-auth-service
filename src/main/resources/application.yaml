app:
  kafka:
    topics:
      user-registration-events: notifications.registration.events        # Topic for user reg events
      user-reset-events: notifications.reset.password.events # Topic for password reset events
      dead-letter-queue: dlq-topic    # Topic for "dead" events
    retry:
      max-attempts: 3                 # max number of retries
      backoff-delay: 1000             # initial delay (ms)
      multiplier: 2.0
      max-delay: 10000                # max delay (ms)

