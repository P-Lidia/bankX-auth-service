spring:
  application:
    name: auth-service

  datasource:
    # переменные окружения, которые будем задавать в docker-compose.yml
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      # Hibernate будет автоматически обновлять схему базы данных (можно изменить по необходимости)
      ddl-auto: validate
    # для вывода SQL-запросов в лог (удобно для отладки)
    show-sql: true

  liquibase:
    # путь к файлу миграций Liquibase
    change-log: classpath:/db/changelog/master.yaml

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true # to add info about JSON types in headers
        acks: all  # delivery guarantee(0,1,all)
        retries: 3 # number of retries in case of error
        enable-idempotence: true # protection against duplicates

