spring:
  application:
    name: auth-service

  jwt:
    access:
      lifetime: 900000       # 15 минут
    refresh:
      lifetime: 604800000    # 7 дней

  datasource:
    # переменные окружения, которые будем задавать в docker-compose.yml
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      # Hibernate будет автоматически обновлять схему базы данных (можно изменить по необходимости)
      ddl-auto: update
    # для вывода SQL-запросов в лог (удобно для отладки)
    show-sql: true

  liquibase:
    # путь к файлу миграций Liquibase
    change-log: classpath:/db/changelog/master.yaml

server:
  port: 8081

kafka:
  # bootstrap-servers: localhost:9092
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: true # to add info about JSON types in headers
      acks: all  # delivery guarantee(0,1,all)
      retries: 3 # number of retries in case of error
      enable-idempotence: true # protection against duplicates


app:
  kafka:
    topics:
      user-registration-events: notifications.registration.events        # Topic for user reg events
      user-reset-events: notifications.reset.password.events # Topic for password reset events
      dead-letter-queue: dlq-topic    # Topic for "dead" events
    retry:
      max-attempts: 3                 # max number of retries
      backoff-delay: 1000             # initial delay (ms)
      multiplier: 2.0
      max-delay: 10000                # max delay (ms)
