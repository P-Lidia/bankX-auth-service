# Временно отключено партиционирование и всё, что с этим связано
databaseChangeLog:
- changeSet:
    id: create-users
    author: P-Lidia
    changes:
      - createTable:
          tableName: users
          columns:
            - column:
                name: id
                type: BIGSERIAL
                constraints:
                  primaryKey: true
            - column:
                name: user_name
                type: VARCHAR(255)
                constraints:
                  nullable: false
            - column:
                name: user_surname
                type: VARCHAR(255)
                constraints:
                  nullable: false
            - column:
                name: email
                type: VARCHAR(255)
                constraints:
                  nullable: false
                  unique: true
            - column:
                name: password_hash
                type: VARCHAR(255)
                constraints:
                  nullable: false
            - column:
                name: status
                type: VARCHAR(20)
                constraints:
                  nullable: false
            - column:
                name: created_at
                type: TIMESTAMP
                defaultValueComputed: "NOW()"
            - column:
                name: updated_at
                type: TIMESTAMP
                defaultValueComputed: "NOW()"

