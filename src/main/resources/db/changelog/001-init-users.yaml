- changeSet:
    id: create-roles
    author: P-Lidia
    changes:
      - createTable:
          tableName: roles
          columns:
            - column:
                name: id
                type: BIGSERIAL
                constraints:
                  primaryKey: true
            - column:
                name: code
                type: VARCHAR(20)
                constraints:
                  nullable: false
                  unique: true
- changeSet:
    id: create-user-roles
    author: P-Lidia
    changes:
      - createTable:
          tableName: user_roles
          columns:
            - column:
                name: user_id
                type: BIGINT
                constraints:
                  nullable: false
            - column:
                name: role_id
                type: BIGINT
                constraints:
                  nullable: false
      - addForeignKeyConstraint:
          baseTableName: user_roles
          baseColumnNames: user_id
          referencedTableName: users
          referencedColumnNames: id
          constraintName: fk_user_role_users
          onDelete: CASCADE
      - addForeignKeyConstraint:
          baseTableName: user_roles
          baseColumnNames: role_id
          referencedTableName: roles
          referencedColumnNames: id
          constraintName: fk_user_role_roles
      - addUniqueConstraint:
          tableName: user_roles
          columnNames: user_id
          constraintName: ux_user_roles_user_id