databaseChangeLog:
  - changeSet:
      id: 007-create-refresh-tokens-table
      author: dyankovskaya
      comment: Create refresh_tokens table with foreign key to users
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token_value
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
              baseTableName: refresh_tokens
              baseColumnNames: user_id
              constraintName: fk_refresh_tokens_user_id
              referencedTableName: users
              referencedColumnNames: id
              onDelete: CASCADE

        - createIndex:
            indexName: idx_refresh_tokens_token_value
            tableName: refresh_tokens
            columns:
               - column:
                  name: token_value

        - createIndex:
            indexName: idx_refresh_tokens_user_id
            tableName: refresh_tokens
            columns:
               - column:
                  name: user_id